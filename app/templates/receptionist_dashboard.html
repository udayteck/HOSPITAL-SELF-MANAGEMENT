{% extends "base.html" %}
{% block title %}Receptionist Dashboard{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Receptionist Dashboard</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <i class="fas fa-calendar-plus text-teal-600 text-3xl mb-3"></i>
            <h2 class="text-xl font-semibold">Create Appointment</h2>
            <p class="text-gray-600 mt-2">Manually book an appointment for a patient.</p>
            <a href="{{ url_for('receptionist.create_appointment') }}" class="inline-block mt-4 bg-teal-600 text-white px-4 py-2 rounded-md">Go</a>
        </div>
        <div class="bg-white p-6 rounded-lg shadow-md">
            <i class="fas fa-check-circle text-teal-600 text-3xl mb-3"></i>
            <h2 class="text-xl font-semibold">Verify Appointment</h2>
            <p class="text-gray-600 mt-2">Check appointment details by ID.</p>
            <a href="{{ url_for('receptionist.verify_appointment') }}" class="inline-block mt-4 bg-teal-600 text-white px-4 py-2 rounded-md">Go</a>
        </div>
    </div>
</div>
<a href="{{ url_for('receptionist.manage_bills') }}" class="inline-block mt-4 bg-teal-600 text-white px-4 py-2 rounded-md">
    <div class="flex items-center justify-between">
        <div><i class="fas fa-file-invoice-dollar text-3xl"></i></div>
        <div class="text-right">
            <p class="text-sm opacity-90">Accounts</p>
            <p class="text-xl font-bold">Bills</p>
        </div>
    </div>
</a>
{% endblock %}
