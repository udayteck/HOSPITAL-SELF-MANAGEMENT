{% extends "base.html" %}
{% block title %}Edit Bill - SKD Hospital{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto bg-white/10 backdrop-blur-md rounded-xl shadow-lg p-6 border border-white/10">
    <h2 class="text-2xl font-bold text-white mb-4">✏️ Edit Bill</h2>
    <form method="POST">
        <div class="space-y-4">
            <!-- Patient -->
            <div>
                <label class="block text-sm font-medium text-white/80 mb-1">Patient</label>
                <select name="patient_id" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-teal-400" required>
                    {% for p in patients %}
                        <option value="{{ p.id }}" {% if p.id == bill.patient_id %}selected{% endif %}>{{ p.full_name }} ({{ p.user.email }})</option>
                    {% endfor %}
                </select>
            </div>
            <!-- Appointment -->
            <div>
                <label class="block text-sm font-medium text-white/80 mb-1">Appointment (optional)</label>
                <select name="appointment_id" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-teal-400">
                    <option value="">Not linked</option>
                    {% for apt in appointments %}
                        <option value="{{ apt.id }}" {% if apt.id == bill.appointment_id %}selected{% endif %}>Dr. {{ apt.doctor.full_name }} on {{ apt.availability.slot_start.strftime('%d/%m/%Y %H:%M') }}</option>
                    {% endfor %}
                </select>
            </div>
            <!-- Amount -->
            <div>
                <label class="block text-sm font-medium text-white/80 mb-1">Amount (₹)</label>
                <input type="number" step="0.01" name="amount" value="{{ bill.amount }}" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-teal-400" required>
            </div>
            <!-- Items -->
            <div>
                <label class="block text-sm font-medium text-white/80 mb-1">Items / Services</label>
                <textarea name="items" rows="4" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-teal-400" required>{{ bill.items }}</textarea>
            </div>
            <!-- Status -->
            <div>
                <label class="block text-sm font-medium text-white/80 mb-1">Status</label>
                <select name="status" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white focus:ring-2 focus:ring-teal-400">
                    <option value="Pending" {% if bill.status == 'Pending' %}selected{% endif %}>Pending</option>
                    <option value="Paid" {% if bill.status == 'Paid' %}selected{% endif %}>Paid</option>
                    <option value="Overdue" {% if bill.status == 'Overdue' %}selected{% endif %}>Overdue</option>
                </select>
            </div>
        </div>
        <div class="mt-6 flex flex-wrap gap-3">
            <button type="submit" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg transition shadow-md">
                <i class="fas fa-save"></i> Save Changes
            </button>
            <!-- Back/Cancel -->
            <a href="
                {% if current_user.role == 'admin' %}
                    {{ url_for('admin.view_bill', bill_id=bill.id) }}
                {% else %}
                    {{ url_for('receptionist.view_bill', bill_id=bill.id) }}
                {% endif %}
            " class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg transition border border-white/10">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
