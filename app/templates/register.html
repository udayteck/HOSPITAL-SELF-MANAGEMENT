{% extends "base.html" %}
{% block title %}Sign Up - SKD Hospital{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto bg-white/10 backdrop-blur-md rounded-xl shadow-lg overflow-hidden border border-white/10">
    <div class="bg-teal-600/80 px-6 py-4">
        <h2 class="text-2xl font-bold text-white text-center">Patient Registration</h2>
        <p class="text-teal-100 text-center text-sm mt-1">Verify your email to get started</p>
    </div>

    <div class="p-6 md:p-8">
        <!-- Step 1: Email and OTP -->
        <div id="step1" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-white/80 mb-1">Email Address</label>
                <input type="email" id="reg-email" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white placeholder-white/50 focus:ring-2 focus:ring-teal-400" placeholder="your@example.com">
                <p id="email-error" class="text-red-400 text-xs mt-1 hidden"></p>
            </div>
            <div>
                <label class="block text-sm font-medium text-white/80 mb-1">OTP</label>
                <div class="flex gap-2 flex-wrap">
                    <input type="text" id="reg-otp" class="flex-1 min-w-[120px] px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white placeholder-white/50 focus:ring-2 focus:ring-teal-400" placeholder="6-digit OTP" maxlength="6">
                    <button type="button" id="sendOtpBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg transition">Send OTP</button>
                    <button type="button" id="verifyOtpBtn" class="bg-teal-700 hover:bg-teal-800 text-white px-4 py-2 rounded-lg transition">Verify</button>
                </div>
                <p id="otp-error" class="text-red-400 text-xs mt-1 hidden"></p>
            </div>
        </div>

        <!-- Step 2: Registration Form (hidden initially) -->
        <div id="step2" class="hidden space-y-6">
            <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm" novalidate>
                {{ form.hidden_tag() }}  <!-- CSRF token -->

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-white/80 mb-1">Email Address</label>
                        <input type="email" name="email" id="verified-email" readonly class="w-full px-4 py-2 bg-white/10 border border-white/20 rounded-lg text-white/50 cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-white/80 mb-1">Full Name</label>
                        <input type="text" name="full_name" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white placeholder-white/50 focus:ring-2 focus:ring-teal-400" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-white/80 mb-1">Phone Number</label>
                    <input type="tel" name="phone" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white placeholder-white/50 focus:ring-2 focus:ring-teal-400" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-white/80 mb-1">Password</label>
                        <input type="password" name="password" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white placeholder-white/50 focus:ring-2 focus:ring-teal-400" required minlength="6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-white/80 mb-1">Confirm Password</label>
                        <input type="password" name="confirm_password" class="w-full px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white placeholder-white/50 focus:ring-2 focus:ring-teal-400" required minlength="6">
                    </div>
                </div>

                <button type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold py-2 rounded-lg transition">Complete Registration</button>
            </form>
        </div>
    </div>
</div>

<script>
    // ===== JavaScript for OTP steps (same as before) =====
    (function() {
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const regEmail = document.getElementById('reg-email');
        const regOtp = document.getElementById('reg-otp');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const emailError = document.getElementById('email-error');
        const otpError = document.getElementById('otp-error');
        const verifiedEmailField = document.getElementById('verified-email');
        const registerForm = document.getElementById('registerForm');

        let isOtpVerified = false;
        let verifiedEmail = '';

        sendOtpBtn.addEventListener('click', async () => {
            const email = regEmail.value.trim();
            if (!email || !email.includes('@')) {
                emailError.textContent = 'Please enter a valid email.';
                emailError.classList.remove('hidden');
                return;
            }
            emailError.classList.add('hidden');
            sendOtpBtn.disabled = true;
            sendOtpBtn.textContent = 'Sending...';
            try {
                const res = await fetch("{{ url_for('auth.send_otp') }}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (data.success) {
                    alert('OTP sent to your email.');
                } else {
                    alert(data.message || 'Failed to send OTP.');
                }
            } catch (err) {
                alert('Network error. Please try again.');
            }
            sendOtpBtn.disabled = false;
            sendOtpBtn.textContent = 'Send OTP';
        });

        verifyOtpBtn.addEventListener('click', async () => {
            const email = regEmail.value.trim();
            const otp = regOtp.value.trim();
            if (!email || !otp) {
                otpError.textContent = 'Email and OTP are required.';
                otpError.classList.remove('hidden');
                return;
            }
            otpError.classList.add('hidden');
            verifyOtpBtn.disabled = true;
            verifyOtpBtn.textContent = 'Verifying...';
            try {
                const res = await fetch("{{ url_for('auth.verify_otp') }}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();
                if (data.success) {
                    verifiedEmail = email;
                    isOtpVerified = true;
                    verifiedEmailField.value = email;
                    step1.classList.add('hidden');
                    step2.classList.remove('hidden');
                    alert('Email verified! Complete registration.');
                } else {
                    alert(data.message || 'Invalid or expired OTP.');
                }
            } catch (err) {
                alert('Network error. Please try again.');
            }
            verifyOtpBtn.disabled = false;
            verifyOtpBtn.textContent = 'Verify';
        });

        // Prevent form submission if email not verified
        registerForm.addEventListener('submit', function(e) {
            if (!isOtpVerified) {
                e.preventDefault();
                alert('Please verify your email first.');
            }
        });
    })();
</script>

{% endblock %}
