{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-12 max-w-md">
    <div class="glass p-8 rounded-2xl">
        <h1 class="text-3xl font-bold text-white text-glow mb-2">Patient Registration</h1>
        <p class="text-white/50 text-sm mb-6">Verify your email to get started</p>

        <form method="POST" action="{{ url_for('auth.register') }}" id="register-form">
            <!-- Full Name -->
            <div class="mb-4">
                <label for="full_name" class="block text-white/80 text-sm font-medium mb-1">Full Name</label>
                <input type="text" name="full_name" id="full_name" required
                       class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400 transition">
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label for="email" class="block text-white/80 text-sm font-medium mb-1">Email Address</label>
                <div class="flex gap-2">
                    <input type="email" name="email" id="email" required
                           class="flex-1 px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400 transition">
                    <button type="button" id="send-otp-btn" 
                            class="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-lg font-medium transition">
                        Send OTP
                    </button>
                </div>
                <div id="otp-status" class="text-sm mt-1"></div>
            </div>

            <!-- OTP -->
            <div class="mb-4">
                <label for="otp" class="block text-white/80 text-sm font-medium mb-1">OTP</label>
                <div class="flex gap-2">
                    <input type="text" name="otp" id="otp" placeholder="6-digit OTP" maxlength="6"
                           class="flex-1 px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400 transition">
                    <button type="button" id="verify-otp-btn"
                            class="px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium transition">
                        Verify
                    </button>
                </div>
                <div id="verify-status" class="text-sm mt-1"></div>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="block text-white/80 text-sm font-medium mb-1">Password</label>
                <input type="password" name="password" id="password" required minlength="6"
                       class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400 transition">
            </div>

            <div class="mb-6">
                <label for="confirm_password" class="block text-white/80 text-sm font-medium mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required minlength="6"
                       class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400 transition">
            </div>

            <!-- Hidden role (default patient) -->
            <input type="hidden" name="role" value="patient">

            <button type="submit" id="register-btn"
                    class="w-full bg-gradient-to-r from-teal-400 to-cyan-500 hover:from-teal-300 hover:to-cyan-400 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-teal-500/30">
                Register
            </button>
        </form>

        <p class="text-white/50 text-sm text-center mt-4">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="text-teal-400 hover:underline">Login</a>
        </p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sendOtpBtn = document.getElementById('send-otp-btn');
        const verifyOtpBtn = document.getElementById('verify-otp-btn');
        const emailInput = document.getElementById('email');
        const otpInput = document.getElementById('otp');
        const otpStatus = document.getElementById('otp-status');
        const verifyStatus = document.getElementById('verify-status');

        // Send OTP
        sendOtpBtn.addEventListener('click', async function() {
            const email = emailInput.value.trim();
            if (!email) {
                otpStatus.innerHTML = '<span class="text-red-400">Please enter your email.</span>';
                return;
            }
            otpStatus.innerHTML = '<span class="text-yellow-400">Sending OTP...</span>';
            try {
                const response = await fetch('{{ url_for("auth.send_otp") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const data = await response.json();
                if (data.success) {
                    otpStatus.innerHTML = '<span class="text-green-400">OTP sent to your email. Check logs for demo.</span>';
                } else {
                    otpStatus.innerHTML = `<span class="text-red-400">${data.message}</span>`;
                }
            } catch (error) {
                otpStatus.innerHTML = '<span class="text-red-400">Network error. Please try again.</span>';
            }
        });

        // Verify OTP
        verifyOtpBtn.addEventListener('click', async function() {
            const email = emailInput.value.trim();
            const otp = otpInput.value.trim();
            if (!email || !otp) {
                verifyStatus.innerHTML = '<span class="text-red-400">Please enter email and OTP.</span>';
                return;
            }
            verifyStatus.innerHTML = '<span class="text-yellow-400">Verifying...</span>';
            try {
                const response = await fetch('{{ url_for("auth.verify_otp") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, otp: otp })
                });
                const data = await response.json();
                if (data.success) {
                    verifyStatus.innerHTML = '<span class="text-green-400">OTP verified! You can now register.</span>';
                } else {
                    verifyStatus.innerHTML = `<span class="text-red-400">${data.message}</span>`;
                }
            } catch (error) {
                verifyStatus.innerHTML = '<span class="text-red-400">Network error. Please try again.</span>';
            }
        });
    });
</script>
{% endblock %}
