{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="glass p-8 rounded-2xl">
        <h1 class="text-3xl font-bold text-white text-glow mb-4">{{ title or 'Generate New Bill' }}</h1>

        <form method="POST" class="space-y-4">
            <!-- Patient -->
            <div>
                <label for="patient_id" class="block text-white/80 text-sm font-medium mb-1">Patient</label>
                <select name="patient_id" id="patient_id" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400">
                    <option value="">-- Select Patient --</option>
                    {% for patient in patients %}
                    <option value="{{ patient.id }}" class="bg-gray-800">{{ patient.full_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Appointment -->
            <div>
                <label for="appointment_id" class="block text-white/80 text-sm font-medium mb-1">Appointment (optional)</label>
                <select name="appointment_id" id="appointment_id" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400">
                    <option value="">-- None --</option>
                    {% for apt in appointments %}
                    <option value="{{ apt.id }}">Dr. {{ apt.doctor.full_name }} on {{ apt.date.strftime('%d/%m/%Y') }} at {{ apt.start_time.strftime('%I:%M %p') }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Amount -->
            <div>
                <label for="amount" class="block text-white/80 text-sm font-medium mb-1">Amount (₹)</label>
                <input type="number" step="0.01" name="amount" id="amount" required min="0"
                       class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400">
            </div>

            <!-- Items / Description -->
            <div>
                <label for="items" class="block text-white/80 text-sm font-medium mb-1">Description / Items</label>
                <textarea name="items" id="items" rows="3" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/30 focus:outline-none focus:border-teal-400" placeholder="e.g. Consultation, Lab tests, etc."></textarea>
            </div>

            <!-- Status -->
            <div>
                <label for="status" class="block text-white/80 text-sm font-medium mb-1">Status</label>
                <select name="status" id="status" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400">
                    <option value="Pending">Pending</option>
                    <option value="Paid">Paid</option>
                    <option value="Overdue">Overdue</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-teal-400 to-cyan-500 hover:from-teal-300 hover:to-cyan-400 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-teal-500/30">
                <i class="fas fa-file-invoice mr-2"></i> Generate Bill
            </button>
        </form>
    </div>
</div>
{% endblock %}
