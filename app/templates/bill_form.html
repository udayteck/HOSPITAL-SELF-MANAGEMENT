{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="glass p-8 rounded-2xl shadow-2xl">
        
        <!-- Dynamic Title -->
        {% if bill %}
            <h1 class="text-3xl font-bold text-white text-glow mb-4">
                <i class="fas fa-pen text-teal-400 mr-2"></i> Edit Bill #{{ bill.bill_number or bill.id }}
            </h1>
        {% else %}
            <h1 class="text-3xl font-bold text-white text-glow mb-4">
                <i class="fas fa-plus-circle text-teal-400 mr-2"></i> Generate New Bill - Receptionist
            </h1>
        {% endif %}

        <form method="POST" class="space-y-5">
            <!-- ✅ CSRF token removed – not needed in Flask without WTForms -->

            <!-- 1. Patient -->
            <div>
                <label class="block text-white/80 text-sm font-medium mb-1.5">
                    <i class="fas fa-user text-teal-400 mr-1"></i> Patient
                </label>
                <select name="patient_id" required>
                    <option value="">-- Select Patient --</option>
                    {% for patient in patients %}
                        <option value="{{ patient.id }}" {% if bill and patient.id == bill.patient_id %}selected{% endif %}>
                            {{ patient.full_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- 2. Appointment -->
            <div>
                <label class="block text-white/80 text-sm font-medium mb-1.5">
                    <i class="fas fa-calendar-check text-teal-400 mr-1"></i> Appointment (optional)
                </label>
                <select name="appointment_id">
                    <option value="">-- None --</option>
                    {% for apt in appointments %}
                        <option value="{{ apt.id }}" {% if bill and apt.id == bill.appointment_id %}selected{% endif %}>
                            Dr. {{ apt.doctor.full_name }} on {{ apt.date.strftime('%d/%m/%Y') }} at {{ apt.start_time.strftime('%I:%M %p') }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- 3. Amount -->
            <div>
                <label class="block text-white/80 text-sm font-medium mb-1.5">
                    <i class="fas fa-indian-rupee-sign text-teal-400 mr-1"></i> Amount (₹)
                </label>
                <input type="number" step="0.01" name="amount" required min="0" 
                       value="{{ bill.amount if bill else '' }}" 
                       placeholder="0.00" />
            </div>

            <!-- 4. Description -->
            <div>
                <label class="block text-white/80 text-sm font-medium mb-1.5">
                    <i class="fas fa-list text-teal-400 mr-1"></i> Description / Items
                </label>
                <textarea name="items" rows="3" placeholder="e.g. Consultation, Lab tests, etc.">{{ bill.items if bill else '' }}</textarea>
            </div>

            <!-- 5. Status -->
            <div>
                <label class="block text-white/80 text-sm font-medium mb-1.5">
                    <i class="fas fa-circle text-teal-400 mr-1"></i> Status
                </label>
                <select name="status">
                    <option value="Pending" {% if bill and bill.status == 'Pending' %}selected{% endif %}>Pending</option>
                    <option value="Paid" {% if bill and bill.status == 'Paid' %}selected{% endif %}>Paid</option>
                    <option value="Overdue" {% if bill and bill.status == 'Overdue' %}selected{% endif %}>Overdue</option>
                </select>
            </div>

            <!-- 6. Submit Button -->
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-teal-400 to-cyan-500 hover:from-teal-300 hover:to-cyan-400 text-white font-bold py-3.5 rounded-lg transition duration-300 shadow-lg shadow-teal-500/30 flex items-center justify-center gap-2 text-lg">
                <i class="fas fa-save"></i> 
                {% if bill %}Update Bill{% else %}Generate Bill{% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
