{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="glass p-8 rounded-2xl">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-14 h-14 rounded-full bg-teal-500/20 flex items-center justify-center text-teal-300 text-2xl">
                <i class="fas fa-calendar-plus"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-white text-glow">Book Appointment</h1>
                <p class="text-white/50 text-sm">Select a doctor, date, and available slot</p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('patient.book_appointment') }}" id="bookingForm" class="space-y-5">
            <!-- Doctor Selection -->
            <div>
                <label for="doctor_id" class="block text-white/80 text-sm font-medium mb-1">
                    <i class="fas fa-user-md mr-1"></i> Select Doctor
                </label>
                <select name="doctor_id" id="doctor_id" required
                        class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-400/20 transition">
                    <option value="" class="bg-gray-800">-- Choose a doctor --</option>
                    {% for doctor in doctors %}
                    <option value="{{ doctor.id }}" class="bg-gray-800 text-white">
                        Dr. {{ doctor.full_name }} ({{ doctor.specialization or 'General' }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Date -->
            <div>
                <label for="date" class="block text-white/80 text-sm font-medium mb-1">
                    <i class="fas fa-calendar-alt mr-1"></i> Date
                </label>
                <input type="date" name="date" id="date" required
                       min="{{ now.date().isoformat() if now else '' }}"
                       class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-400/20 transition">
            </div>

            <!-- Slots -->
            <div>
                <label class="block text-white/80 text-sm font-medium mb-1">
                    <i class="fas fa-clock mr-1"></i> Available Slots
                </label>
                <div id="slotsContainer" class="flex flex-wrap gap-3 min-h-[60px]">
                    <span class="text-white/40 text-sm">Select a doctor and date to see slots.</span>
                </div>
                <input type="hidden" name="start_time" id="selectedStartTime" required>
                <input type="hidden" name="slot_display" id="selectedSlotDisplay">
            </div>

            <!-- Notes -->
            <div>
                <label for="notes" class="block text-white/80 text-sm font-medium mb-1">
                    <i class="fas fa-notes-medical mr-1"></i> Notes (optional)
                </label>
                <textarea name="notes" id="notes" rows="3"
                          class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/30 focus:outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-400/20 transition"
                          placeholder="Any special requests or symptoms..."></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" id="submitBtn" disabled
                    class="w-full bg-gradient-to-r from-teal-400 to-cyan-500 hover:from-teal-300 hover:to-cyan-400 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-teal-500/30 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fas fa-calendar-plus"></i> Request Appointment
            </button>
        </form>
    </div>
</div>

<script>
    const doctorSelect = document.getElementById('doctor_id');
    const dateInput = document.getElementById('date');
    const slotsContainer = document.getElementById('slotsContainer');
    const selectedStartTime = document.getElementById('selectedStartTime');
    const selectedSlotDisplay = document.getElementById('selectedSlotDisplay');
    const submitBtn = document.getElementById('submitBtn');

    function fetchSlots() {
        const doctorId = doctorSelect.value;
        const date = dateInput.value;
        if (!doctorId || !date) {
            slotsContainer.innerHTML = '<span class="text-white/40 text-sm">Select both doctor and date.</span>';
            selectedStartTime.value = '';
            selectedSlotDisplay.value = '';
            submitBtn.disabled = true;
            return;
        }

        slotsContainer.innerHTML = '<span class="text-white/40 text-sm"><i class="fas fa-spinner fa-spin"></i> Loading slots...</span>';

        fetch(`/patient/api/available_slots/${doctorId}?date=${date}`)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    slotsContainer.innerHTML = `<span class="text-red-400 text-sm">${data.error}</span>`;
                    return;
                }
                if (data.length === 0) {
                    slotsContainer.innerHTML = '<span class="text-white/40 text-sm">No available slots on this date.</span>';
                    selectedStartTime.value = '';
                    selectedSlotDisplay.value = '';
                    submitBtn.disabled = true;
                    return;
                }
                slotsContainer.innerHTML = '';
                data.forEach(slot => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'px-4 py-2 border border-teal-400/40 text-teal-300 rounded-lg hover:bg-teal-600 hover:text-white transition focus:outline-none focus:ring-2 focus:ring-teal-500';
                    btn.textContent = `${slot.start} - ${slot.end}`;
                    btn.dataset.start = slot.start;
                    btn.dataset.end = slot.end;
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('#slotsContainer button').forEach(b => {
                            b.classList.remove('bg-teal-600', 'text-white');
                            b.classList.add('border-teal-400/40', 'text-teal-300');
                        });
                        this.classList.remove('border-teal-400/40', 'text-teal-300');
                        this.classList.add('bg-teal-600', 'text-white');
                        selectedStartTime.value = slot.start;
                        selectedSlotDisplay.value = `${slot.start} - ${slot.end}`;
                        submitBtn.disabled = false;
                    });
                    slotsContainer.appendChild(btn);
                });
            })
            .catch(err => {
                slotsContainer.innerHTML = `<span class="text-red-400 text-sm">Error loading slots.</span>`;
                console.error(err);
            });
    }

    doctorSelect.addEventListener('change', fetchSlots);
    dateInput.addEventListener('change', fetchSlots);

    if (doctorSelect.value && dateInput.value) fetchSlots();
</script>
{% endblock %}
